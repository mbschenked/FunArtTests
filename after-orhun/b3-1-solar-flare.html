<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>B3-1 · Solar Flare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --label:     rgba(255, 203, 138, 0.92);
    --label-dim: rgba(255, 203, 138, 0.72);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: #0a0203; color: white;
    font-family: 'Fira Code', 'JetBrains Mono', monospace;
    overflow: hidden; height: 100vh;
  }

  #gl {
    position: fixed; inset: 0;
    display: block;
    background:
      radial-gradient(ellipse at center,
        #1a0606 0%,
        #0a0203 60%,
        #000000 100%);
  }

  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.18) 0 1px,
      transparent 1px 3px
    );
    pointer-events: none;
    z-index: 10;
    mix-blend-mode: multiply;
  }
  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.45) 75%,
      rgba(0,0,0,0.9) 100%);
    pointer-events: none;
    z-index: 11;
  }

  .hud {
    position: fixed;
    top: 18px; left: 22px;
    z-index: 20;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--label);
  }
  .hud a {
    color: var(--label-dim);
    text-decoration: none;
    border-bottom: 1px dotted var(--label-dim);
  }
  .hud a:hover { color: var(--label); border-color: var(--label); }
  .hud a:focus-visible {
    color: var(--label);
    border-color: var(--label);
    outline: 2px solid var(--label);
    outline-offset: 2px;
  }
  .hud .title {
    color: white; font-weight: 500;
    font-size: inherit; line-height: inherit; letter-spacing: inherit;
    text-transform: inherit; margin: 0; display: inline;
  }
  .hud .sep { color: var(--label-dim); margin: 0 0.6em; }

  .meta {
    position: fixed;
    bottom: 18px; right: 22px;
    z-index: 20;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--label-dim);
    text-align: right;
    line-height: 1.6;
  }
  .meta b { color: var(--label); font-weight: 400; }

  .hint {
    position: fixed;
    bottom: 18px; left: 22px;
    z-index: 20;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--label-dim);
  }
  .hint b { color: var(--label); font-weight: 400; }
</style>
</head>
<body>

<canvas id="gl" aria-hidden="true"></canvas>
<div class="scanlines" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>

<header class="hud">
  <a href="index.html">← index</a>
  <span class="sep">/</span>
  <h1 class="title">B3-1 · solar flare</h1>
  <span class="sep">/</span>
  <span style="color: var(--label-dim)">variant: most similar · iter 2</span>
</header>

<aside class="meta" aria-hidden="true">
  <div><b>POINTS</b> 5000 · additive blend</div>
  <div><b>MOTION</b> galaxy rotation + lissajous + spring</div>
  <div><b>REPULSION</b> springs out · damped harmonic</div>
</aside>

<div class="hint" aria-hidden="true"><b>HINT</b> move mouse over the cloud</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

// --- Renderer / scene / camera ---------------------------------------------
const canvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight, false);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  55, window.innerWidth / window.innerHeight, 0.1, 100
);
camera.position.set(0, 0.6, 5.5);
camera.lookAt(0, 0, 0);

// --- Glyph atlas: 1024×32 strip of 32 cells × 32×32 each -------------------
const ATLAS_W = 1024;
const ATLAS_H = 32;
const ATLAS_COLS = 32;
const CELL = ATLAS_W / ATLAS_COLS;

const atlasCanvas = document.createElement('canvas');
atlasCanvas.width = ATLAS_W;
atlasCanvas.height = ATLAS_H;
const actx = atlasCanvas.getContext('2d');
actx.clearRect(0, 0, ATLAS_W, ATLAS_H);

const GLYPHS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメ';
actx.font = `500 ${Math.floor(CELL * 0.85)}px "Fira Code", monospace`;
actx.textBaseline = 'middle';
actx.textAlign = 'center';
actx.fillStyle = '#ffffff';

for (let i = 0; i < ATLAS_COLS; i++) {
  const ch = GLYPHS[i % GLYPHS.length];
  actx.fillText(ch, i * CELL + CELL / 2, ATLAS_H / 2);
}

const atlasTex = new THREE.CanvasTexture(atlasCanvas);
atlasTex.magFilter = THREE.LinearFilter;
atlasTex.minFilter = THREE.LinearFilter;
atlasTex.generateMipmaps = false;
atlasTex.premultiplyAlpha = false;
atlasTex.flipY = false;  // BAKE-IN FIX from iter 1 — keeps glyphs upright

// --- Particle field --------------------------------------------------------
const COUNT = 5000;
const positions = new Float32Array(COUNT * 3);
const glyphIdx  = new Float32Array(COUNT);
const seeds     = new Float32Array(COUNT);

// Per-particle spring state (CPU-only authoritative; offset is uploaded each frame)
const springOffset = new Float32Array(COUNT * 3);  // uploaded as aSpringOffset
const springVel    = new Float32Array(COUNT * 3);  // JS-only, never uploaded

// Cached projected positions for the proximity test (avoids re-allocating Vector3)
const projected = new Float32Array(COUNT * 2);

for (let i = 0; i < COUNT; i++) {
  const r = Math.sqrt(Math.random()) * 2.4;
  const theta = Math.random() * Math.PI * 2;
  positions[i * 3 + 0] = Math.cos(theta) * r;
  positions[i * 3 + 1] = (Math.random() - 0.5) * 0.5;
  positions[i * 3 + 2] = Math.sin(theta) * r;
  glyphIdx[i] = Math.floor(Math.random() * ATLAS_COLS);
  seeds[i]    = Math.random();
}

const geom = new THREE.BufferGeometry();
geom.setAttribute('position',      new THREE.BufferAttribute(positions, 3));
geom.setAttribute('aGlyph',        new THREE.BufferAttribute(glyphIdx, 1));
geom.setAttribute('aSeed',         new THREE.BufferAttribute(seeds, 1));
const springAttr = new THREE.BufferAttribute(springOffset, 3);
springAttr.setUsage(THREE.DynamicDrawUsage);
geom.setAttribute('aSpringOffset', springAttr);

const material = new THREE.ShaderMaterial({
  uniforms: {
    uTime:    { value: 0 },
    uAtlas:   { value: atlasTex },
    uPxRatio: { value: renderer.getPixelRatio() },
  },
  vertexShader: /* glsl */ `
    uniform float uTime;
    uniform float uPxRatio;
    attribute float aGlyph;
    attribute float aSeed;
    attribute vec3  aSpringOffset;

    varying float vGlyph;
    varying float vDepth;
    varying float vAlpha;

    void main() {
      vec3 base = position;
      float radius = length(base.xz);
      float angle  = uTime * 0.10 + radius * 0.55;
      float c = cos(angle), s = sin(angle);
      vec2 rotXZ = vec2(c * base.x - s * base.z, s * base.x + c * base.z);

      float ts = uTime + aSeed * 6.2831;
      vec3 wobble = vec3(
        sin(ts * 0.40) * 0.18,
        cos(ts * 0.30 + aSeed * 6.0) * 0.22,
        sin(ts * 0.50 + aSeed * 3.0) * 0.18
      );

      vec3 p = vec3(rotXZ.x, base.y, rotXZ.y) + wobble + aSpringOffset;
      vec4 mv = modelViewMatrix * vec4(p, 1.0);

      gl_PointSize = clamp(64.0 / -mv.z * uPxRatio, 8.0, 24.0);
      gl_Position = projectionMatrix * mv;

      vGlyph = aGlyph;
      vDepth = -mv.z;
      vAlpha = smoothstep(8.0, 1.5, -mv.z);
    }
  `,
  fragmentShader: /* glsl */ `
    uniform sampler2D uAtlas;
    varying float vGlyph;
    varying float vDepth;
    varying float vAlpha;

    void main() {
      // BAKE-IN FIX: flip v to keep glyph upright (atlas flipY = false above)
      vec2 uv = vec2(
        (vGlyph + gl_PointCoord.x) / 32.0,
        1.0 - gl_PointCoord.y
      );
      vec4 g = texture2D(uAtlas, uv);
      if (g.a < 0.08) discard;

      // Warm depth-grade: near = sunlit amber, mid = ember, far = scorched red
      float d = clamp((vDepth - 1.5) / 6.0, 0.0, 1.0);
      vec3 near  = vec3(1.00, 0.80, 0.54);  // #ffcb8a
      vec3 mid   = vec3(0.90, 0.50, 0.29);  // #e6804a
      vec3 far   = vec3(0.66, 0.23, 0.12);  // #a83a1f
      vec3 col   = mix(near, mid, smoothstep(0.0, 0.5, d));
      col        = mix(col,  far, smoothstep(0.5, 1.0, d));

      gl_FragColor = vec4(col, g.a * vAlpha);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const points = new THREE.Points(geom, material);
scene.add(points);

// --- Camera orbit (matches B3) ---------------------------------------------
function updateCamera(t) {
  const r = 5.5;
  camera.position.x = Math.sin(t * 0.10) * r * 0.55;
  camera.position.z = Math.cos(t * 0.10) * r;
  camera.position.y = Math.sin(t * 0.07) * 1.0 + 0.4;
  camera.lookAt(0, 0, 0);
}

// --- Mouse tracking (NDC) --------------------------------------------------
const mouseNDC = { x: 999, y: 999, active: false };  // off-screen by default
window.addEventListener('pointermove', (e) => {
  mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouseNDC.y = -((e.clientY / window.innerHeight) * 2 - 1);
  mouseNDC.active = true;
});
window.addEventListener('pointerleave', () => { mouseNDC.active = false; });
window.addEventListener('blur',         () => { mouseNDC.active = false; });

// --- Spring step (damped harmonic boings) ----------------------------------
// We let the GPU draw with aSpringOffset; the CPU integrates spring + impulse.
const K       = 0.18;   // spring constant (pull toward zero)
const DAMP    = 0.88;   // velocity damping per frame
const IMPULSE = 0.06;   // outward kick magnitude
const RADIUS  = 0.22;   // NDC distance under which a kick lands
const _wp = new THREE.Vector3();

function stepSprings(t) {
  // Project the SAME displaced position the vertex shader draws (rotation + wobble + offset).
  // Cheaper than running through the BufferGeometry, and matches what the user sees.
  for (let i = 0; i < COUNT; i++) {
    const ix = i * 3;
    // Apply spring force (Hooke) + damping to velocity, then advance offset.
    springVel[ix    ] = (springVel[ix    ] - springOffset[ix    ] * K) * DAMP;
    springVel[ix + 1] = (springVel[ix + 1] - springOffset[ix + 1] * K) * DAMP;
    springVel[ix + 2] = (springVel[ix + 2] - springOffset[ix + 2] * K) * DAMP;
    springOffset[ix    ] += springVel[ix    ];
    springOffset[ix + 1] += springVel[ix + 1];
    springOffset[ix + 2] += springVel[ix + 2];

    // Hard clamp to keep extremes sane after rapid mouse-jitter.
    if (springOffset[ix    ] >  0.6) springOffset[ix    ] =  0.6;
    if (springOffset[ix    ] < -0.6) springOffset[ix    ] = -0.6;
    if (springOffset[ix + 1] >  0.6) springOffset[ix + 1] =  0.6;
    if (springOffset[ix + 1] < -0.6) springOffset[ix + 1] = -0.6;
    if (springOffset[ix + 2] >  0.6) springOffset[ix + 2] =  0.6;
    if (springOffset[ix + 2] < -0.6) springOffset[ix + 2] = -0.6;
  }

  if (!mouseNDC.active) {
    springAttr.needsUpdate = true;
    return;
  }

  // CRITICAL: camera.position + lookAt() above leave matrixWorld and matrixWorldInverse stale —
  // the renderer refreshes them lazily during render(), AFTER this step runs. Without this,
  // Vector3.project() uses last-frame (or identity on boot) inverse, putting the cavity nowhere
  // near the cursor.
  camera.updateMatrixWorld();
  camera.matrixWorldInverse.copy(camera.matrixWorld).invert();

  // Replicate the vertex-shader transform CPU-side so proximity uses the visual position.
  for (let i = 0; i < COUNT; i++) {
    const ix = i * 3;
    const bx = positions[ix], by = positions[ix + 1], bz = positions[ix + 2];

    // Galaxy rotation: angle = t * 0.10 + radius * 0.55
    const radius = Math.sqrt(bx * bx + bz * bz);
    const angle = t * 0.10 + radius * 0.55;
    const c = Math.cos(angle), s = Math.sin(angle);
    const rotX = c * bx - s * bz;
    const rotZ = s * bx + c * bz;

    // Per-seed lissajous wobble
    const seed = seeds[i];
    const ts = t + seed * 6.2831;
    const wx = Math.sin(ts * 0.40) * 0.18;
    const wy = Math.cos(ts * 0.30 + seed * 6.0) * 0.22;
    const wz = Math.sin(ts * 0.50 + seed * 3.0) * 0.18;

    _wp.set(rotX + wx + springOffset[ix    ],
            by   + wy + springOffset[ix + 1],
            rotZ + wz + springOffset[ix + 2]);
    _wp.project(camera);  // → NDC; handles w-divide + camera matrices

    // Skip particles behind near plane or with degenerate projection
    if (!isFinite(_wp.x) || _wp.z <= -1 || _wp.z >= 1) continue;

    const dx = _wp.x - mouseNDC.x;
    const dy = _wp.y - mouseNDC.y;
    const d  = Math.sqrt(dx * dx + dy * dy);
    if (d > RADIUS) continue;

    const u = d / RADIUS;
    const fall = 1.0 - (u * u * (3.0 - 2.0 * u));  // 1 - smoothstep(0,1,u)
    const invd = d > 0.0001 ? 1.0 / d : 0.0;
    springVel[ix    ] += dx * invd * IMPULSE * fall;
    springVel[ix + 1] += dy * invd * IMPULSE * fall;
    // Small Z jitter so kicks aren't perfectly flat in the XY plane.
    springVel[ix + 2] += (seed - 0.5) * IMPULSE * fall * 0.3;
  }

  springAttr.needsUpdate = true;
}

// --- Resize ----------------------------------------------------------------
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h, false);
  material.uniforms.uPxRatio.value = renderer.getPixelRatio();
}
window.addEventListener('resize', onResize);

// --- Main loop --------------------------------------------------------------
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function tick() {
  if (!reducedMotion) requestAnimationFrame(tick);
  const t = performance.now() / 1000;

  material.uniforms.uTime.value = t;
  updateCamera(t);
  if (!reducedMotion) stepSprings(t);

  renderer.render(scene, camera);
}

if (document.fonts?.ready) {
  document.fonts.ready.then(() => requestAnimationFrame(tick));
} else {
  requestAnimationFrame(tick);
}
</script>

</body>
</html>
